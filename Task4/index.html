<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <header class="topbar">
            <div class="logo">
                <span class="logo-dash">Dash</span><span class="logo-board" id="page-title">board</span>
            </div>
            
            <div class="header-right">
                <div class="search-bar">
                    <input type="text" placeholder="Search your task here...">
                    <button><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </header>

        <div class="main-layout">
           
            <main class="content-area">
                
                <div id="view-dashboard" class="view-section active">
                    <div class="welcome-header">
                        <h2>Welcome back, Sundar 👋</h2>
                    </div>

                    <div class="dashboard-grid">
                        <div class="card todo-list-card">
                            <div class="card-header">
                                <h3><i class="fa-solid fa-clipboard-list"></i> To-Do</h3>
                                <button class="add-task-btn" onclick="openModal('add')"><i class="fa-solid fa-plus"></i> Add task</button>
                            </div>
                            <div class="date-header">20 June • Today</div>
                            
                            <div class="task-list" id="todo-list-container">
                                </div>
                        </div>

                        <div class="dashboard-right-col">
                            <div class="card completed-card">
                                <div class="card-header">
                                    <h3><i class="fa-regular fa-square-check"></i> Completed Task</h3>
                                </div>
                                <div class="task-list" id="completed-list-container">
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="view-mytasks" class="view-section">
                    <div class="mytasks-layout">
                        <div class="card mytasks-list-panel">
                            <div class="card-header">
                                <h3>My Tasks</h3>
                            </div>
                            <div class="task-list" id="mytasks-list-container">
                                </div>
                        </div>

                        <div class="card mytasks-detail-panel" id="task-detail-panel">
                            </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal-overlay" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Task</h3>
                <button class="go-back-btn" onclick="closeModal()">Go Back</button>
            </div>
            
            <form id="task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="task-title" required>
                </div>
                
                <div class="form-group">
                    <label>Date</label>
                    <div class="date-input-wrapper">
                        <input type="date" id="task-date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Priority</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="priority" value="Extreme" checked> 
                            <span class="dot red"></span> Extreme
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="priority" value="Moderate"> 
                            <span class="dot blue"></span> Moderate
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="priority" value="Low"> 
                            <span class="dot green"></span> Low
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-2">
                        <label>Task Description</label>
                        <textarea id="task-desc" placeholder="Start writing here..." required></textarea>
                    </div>
                    <div class="form-group flex-1">
                        <label>Upload Image</label>
                        <div class="upload-zone">
                            <i class="fa-regular fa-image"></i>
                            <p>Drag & Drop files here<br>or</p>
                            <button type="button" class="browse-btn">Browse</button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="task-status">
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="submit-btn">Done</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
